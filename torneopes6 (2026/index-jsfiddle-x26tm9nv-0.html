  <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PES 6 Liga</title>
<style>
body{font-family:Arial;background:#0b0b0b;color:#fff;text-align:center}
img.logo{width:40px}
.team-select{display:flex;justify-content:center;gap:20px;margin:10px}
.team-card{cursor:pointer;border:2px solid #444;padding:10px;border-radius:10px}
.team-card:hover{border-color:gold}
table{margin:20px auto;border-collapse:collapse;width:90%;background:#1a1a1a}
th,td{border:1px solid #444;padding:6px}
th{background:#333}
.section{margin-top:25px}
button{padding:6px 12px;margin-top:10px}
</style>
</head>
<body>

<img src="pes6.png" style="width:60%;max-width:600px">

<h2>Elegir Equipos</h2>
<div class="team-select">
<div class="team-card" onclick="selectTeam('Zaragoza')">
<img src="zaragoza.png" class="logo"><br>Zaragoza
</div>
<div class="team-card" onclick="selectTeam('Lyon')">
<img src="lyon.png" class="logo"><br>Lyon
</div>
<div class="team-card" onclick="selectTeam('Tottenham')">
<img src="tottenham.png" class="logo"><br>Tottenham
</div>
</div>

<table>
<thead>
<tr>
<th>Equipo</th><th>Pts</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="section">
<h2>📅 Partido</h2>
<input id="team1" placeholder="Equipo 1">
<input id="goals1" type="number" placeholder="Goles">
<input id="team2" placeholder="Equipo 2">
<input id="goals2" type="number" placeholder="Goles">
<br>
<input id="scorer" placeholder="Goleador">
<input id="assist" placeholder="Asistente">
<input id="yellow" placeholder="Amarilla">
<input id="red" placeholder="Roja">
<br>
<button onclick="addMatch()">Guardar Partido</button>
</div>

<div class="section"><h2>🥇 Goleadores</h2><ul id="scorers"></ul></div>
<div class="section"><h2>🎯 Asistencias</h2><ul id="assists"></ul></div>
<div class="section"><h2>🟨 Amarillas</h2><ul id="yellows"></ul></div>
<div class="section"><h2>🟥 Rojas</h2><ul id="reds"></ul></div>

<script>
let teams=[];
let scorers={},assists={},yellows={},reds={};

function selectTeam(name){
if(!teams.find(t=>t.name===name)){
teams.push({name,pts:0,g:0,e:0,p:0,gf:0,gc:0});
save();renderAll();
}
}

function save(){localStorage.setItem('torneo',JSON.stringify({teams,scorers,assists,yellows,reds}))}
function load(){let d=JSON.parse(localStorage.getItem('torneo'));if(d){teams=d.teams||[];scorers=d.scorers||{};assists=d.assists||{};yellows=d.yellows||{};reds=d.reds||{}}renderAll()}

function addMatch(){
let t1=teams.find(t=>t.name==team1.value);
let t2=teams.find(t=>t.name==team2.value);
if(!t1||!t2)return alert('Equipo no encontrado');
let g1=+goals1.value,g2=+goals2.value;
t1.gf+=g1;t1.gc+=g2;t2.gf+=g2;t2.gc+=g1;
if(g1>g2){t1.pts+=3;t1.g++;t2.p++;}
else if(g2>g1){t2.pts+=3;t2.g++;t1.p++;}
else{t1.pts++;t2.pts++;t1.e++;t2.e++;}
if(scorer.value)scorers[scorer.value]=(scorers[scorer.value]||0)+1;
if(assist.value)assists[assist.value]=(assists[assist.value]||0)+1;
if(yellow.value)yellows[yellow.value]=(yellows[yellow.value]||0)+1;
if(red.value)reds[red.value]=(reds[red.value]||0)+1;
save();renderAll();
}

function renderTable(){
let tb=document.getElementById('table');tb.innerHTML='';
teams.sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc));
teams.forEach(t=>{
tb.innerHTML+=`<tr><td>${t.name}</td><td>${t.pts}</td><td>${t.g}</td><td>${t.e}</td><td>${t.p}</td><td>${t.gf}</td><td>${t.gc}</td><td>${t.gf-t.gc}</td></tr>`
})}

function renderList(obj,id,label){
let el=document.getElementById(id);el.innerHTML='';
Object.entries(obj).sort((a,b)=>b[1]-a[1]).forEach(e=>{
el.innerHTML+=`<li>${e[0]} - ${e[1]} ${label}</li>`
})}

function renderAll(){
renderTable();
renderList(scorers,'scorers','goles');
renderList(assists,'assists','asistencias');
renderList(yellows,'yellows','amarillas');
renderList(reds,'reds','rojas');
}

load();
</script>

</body>
</html>
